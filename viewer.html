<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draftmancer Draft Log Replay</title>
    <link rel="stylesheet" href="src/viewer/viewer.css" />
  </head>
  <body>
    <div id="dmw-landing">
      <h1>Draftmancer Draft Log Replay <span id="dmw-version"></span></h1>
      <p>Load a Draftmancer MTGO / MagicProTools draft log to replay your draft pick by pick.</p>
      <input type="file" id="dmw-file" accept=".txt,text/plain" />
      <div>or paste the log below:</div>
      <textarea id="dmw-paste" rows="10" placeholder="Paste your draft log here…"></textarea>
      <button id="dmw-load">Load</button>
      <div id="dmw-history-section">
        <div class="dmw-history-label">Your recent drafts</div>
        <div id="dmw-history"></div>
      </div>
      <div id="dmw-error" class="dmw-error"></div>
    </div>

    <div id="dmw-replay" hidden>
      <div id="dmw-header">
        <button id="dmw-back">← Drafts</button>
        <button id="dmw-prev">◀ Prev</button>
        <span id="dmw-position"></span>
        <button id="dmw-next">Next ▶</button>
        <label id="dmw-hidepick-label" class="dmw-toggle">
          <input type="checkbox" id="dmw-hidepick" checked /> Hide my pick
        </label>
        <button id="dmw-reveal" hidden>Reveal pick</button>
        <span id="dmw-notice"></span>
      </div>

      <section id="dmw-booster-section">
        <h2>Booster</h2>
        <div id="dmw-booster" class="dmw-grid"></div>
      </section>

      <section id="dmw-wheel-section" hidden>
        <h2 id="dmw-wheel-title"></h2>
        <div id="dmw-wheel" class="dmw-grid"></div>
      </section>

      <section id="dmw-deck-section">
        <div id="dmw-stats"></div>
        <div id="dmw-deck-header">
          <h2 id="dmw-deck-title"></h2>
          <span class="dmw-deck-controls">
            <span class="dmw-sortlabel">Sort:</span>
            <button id="dmw-sort-cmc" class="dmw-sortbtn dmw-active">CMC</button>
            <button id="dmw-sort-color" class="dmw-sortbtn">Color</button>
            <label class="dmw-toggle"><input type="checkbox" id="dmw-split" /> Split creatures</label>
          </span>
        </div>
        <div id="dmw-deck"></div>
      </section>

      <section id="dmw-table-section" hidden>
        <div id="dmw-table-header">
          <button id="dmw-table-toggle">👁 Read the Table</button>
          <button id="dmw-table-reveal" hidden>Reveal</button>
          <button id="dmw-table-close" hidden>Close</button>
          <span id="dmw-table-note"></span>
        </div>
        <div id="dmw-table-ring" hidden></div>
        <div id="dmw-table-body" hidden></div>
        <div id="dmw-table-pool" hidden></div>
      </section>
    </div>

    <script src="src/wheel-core.js"></script>
    <script src="src/viewer/log-parser.js"></script>
    <script src="src/viewer/scryfall.js"></script>
    <script src="src/viewer/replay.js"></script>
    <script src="src/viewer/deck-layout.js"></script>
    <script src="src/viewer/prefs.js"></script>
    <script src="src/history.js"></script>
    <script src="src/viewer/deck-stats.js"></script>
    <script src="src/viewer/mana-sources.js"></script>
    <script src="src/viewer/mana-report.js"></script>
    <script src="src/viewer/table-read.js"></script>
    <script src="src/viewer/viewer.js"></script>
  </body>
</html>
